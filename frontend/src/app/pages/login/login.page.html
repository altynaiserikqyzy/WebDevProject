<div class="page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Welcome to NoRetake KBTU</h1>
        <p class="auth-subtitle">Sign in to find tutors or become one</p>
      </div>

      @if (error) {
        <div class="error-message">{{ error }}</div>
      }

      <div class="auth-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username"
            class="form-input"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            class="form-input"
          />
        </div>

        <button
          class="btn-primary auth-button"
          (click)="onLoginClick()"
          [disabled]="loading"
        >
          @if (loading) {
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </div>

      <div class="auth-footer">
        <p class="auth-note">
          Don't have an account?
          <a routerLink="/signup">Sign up</a>
        </p>
        <p class="auth-hint">
          Note: All users start as students. You can become a tutor later in your profile.
        </p>
      </div>
    </div>
  </div>
</div>
