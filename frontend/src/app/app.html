<div class="min-h-screen">
  <header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/85 backdrop-blur-xl">
    <nav class="section-wrap flex items-center justify-between py-4">
      <a routerLink="/" class="text-lg font-bold tracking-wide text-[#FBF9E4]">NoRetake KBTU</a>
      <div class="hidden items-center gap-6 text-sm text-[#FBF9E4] md:flex">
        <a routerLink="/explore" routerLinkActive="text-[#FBF9E4]" class="transition hover:text-[#FBF9E4]">Explore</a>
        <a routerLink="/tutors" routerLinkActive="text-[#FBF9E4]" class="transition hover:text-[#FBF9E4]">Tutors</a>
        <a routerLink="/calendar" routerLinkActive="text-[#FBF9E4]" class="transition hover:text-[#FBF9E4]">Calendar</a>
        <a routerLink="/profile" routerLinkActive="text-[#FBF9E4]" class="transition hover:text-[#FBF9E4]">Profile</a>
      </div>
      <div class="flex items-center gap-2">
        @if (!auth.isLoggedIn()) {
          <a routerLink="/auth" class="btn-primary">Start Learning</a>
        } @else {
          <button class="btn-secondary text-sm" (click)="onLogoutClick()">Logout</button>
        }
      </div>
    </nav>
  </header>

  <main class="pb-8">
    <router-outlet />
  </main>

  <footer class="border-t border-white/10 bg-slate-950/90">
    <div class="section-wrap grid gap-4 py-8 text-sm text-slate-400 md:grid-cols-2">
      <p>Find trusted tutors from the KBTU community.</p>
      <p class="text-left md:text-right">NoRetake KBTU · Learn smarter, no retakes.</p>
    </div>
  </footer>
</div>
